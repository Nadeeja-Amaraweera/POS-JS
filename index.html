<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS.pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-card">
        <div class="left-panel">
            <h1 class="logo">POS.<span>pro</span></h1>
            <div class="image-container">
                <img src="asset/ec78f11a-b3c5-4bc5-b0f6-984cf7878443.jpg" alt="User at POS terminal">
            </div>
            <p class="footer-text">@Developed By Nadeeja Amaraweera</p>
        </div>

        <div class="right-panel">
            <form class="login-form">
                <div class="input-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn"><a style="text-decoration: none;color: white;" href="system.html">Login</a></button>
            </form>
        </div>
    </div>

</body>
</html>
