<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS.pro</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-[#1e3c4c] to-[#0d1f2a]">
    <div id="login-section" class="flex w-[900px] h-[550px] rounded-2xl overflow-hidden shadow-2xl">
        <!-- LEFT PANEL -->
        <div class="flex flex-col justify-between items-center flex-1 bg-[#8ca3af] p-10">
            <h1 class="text-[2.5rem] text-[#4a6d81] font-bold">
                POS.<span class="text-[#5cb8ff]">pro</span>
            </h1>

            <div class="image-container">
                <img src="asset/ec78f11a-b3c5-4bc5-b0f6-984cf7878443.jpg" alt="User at POS terminal"
                    class="w-[280px] rounded-xl shadow-xl" />
            </div>

            <p class="text-xs text-white/60">@Developed By Nadeeja Amaraweera</p>
        </div>

        <!-- RIGHT PANEL -->
        <div
            class="flex flex-col justify-center items-center flex-[1.2] bg-gradient-to-br from-[#7b96a4] to-[#0d3b4c] p-10">
            <form class="w-4/5">
                <div class="mb-6">
                    <label for="username" class="text-white block mb-2">User Name</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-5 py-3 rounded-full bg-white/20 text-white backdrop-blur-sm border border-white/30 outline-none" />
                </div>

                <div class="mb-6">
                    <label for="password" class="text-white block mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-5 py-3 rounded-full bg-white/20 text-white backdrop-blur-sm border border-white/30 outline-none" />
                </div>

                <button type="button" onclick="login()"
                    class="px-10 py-2 float-right rounded-full bg-white bg-white/20 text-white text-lg border border-white/30 backdrop-blur-md drop-shadow-[0_0_8px_rgba(255,0,0,0.6)] hover:bg-white/30  transition">
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- Login section error message -->
    <!-- Error Box -->
    <div id="error-box" class="fixed top-[10%] left-1/2 -translate-x-1
            bg-red-500/20 text-red-400 px-5 py-4 rounded-md 
            border border-red-500/30 shadow-md w-auto 
            error-msg-box">

        <p id="error-text">Invalid username or password. Please try again.</p>

        <i id="error-close-btn" class="fa-solid fa-xmark fa-xl absolute top-2 right-2 cursor-pointer text-red-500">
        </i>
    </div>

    <div id="dashboard-section" class="section hidden">
        <h1>Welcome to the Dashboard</h1>
        <p>
            This is the dashboard content that will be displayed after a successful
            login.
        </p>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
