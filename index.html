<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS.pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <div class="login-card">
        <div class="left-panel">
            <h1 class="logo">POS.<span>pro</span></h1>
            <div class="image-container">
                <img src="asset/ec78f11a-b3c5-4bc5-b0f6-984cf7878443.jpg" alt="User at POS terminal">
            </div>
            <p class="footer-text">@Developed By Nadeeja Amaraweera</p>
        </div>

        <div class="right-panel">
            <form class="login-form">
                <div class="input-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Login</button>

                <script>
                    var loginbtn = document.getElementById("login-btn");
                    var usernameInput = document.getElementById("username");
                    var passwordInput = document.getElementById("password");


                    function logintoSystem(){
                        var username = usernameInput.value;
                        var password = passwordInput.value;

                        if(username === "admin" && password === "admin123"){
                            window.location.href = "system.html";
                            hideError();
                        } else {
                            showError();
                            hideErrorAuto();
                        }
                    }
                    if (loginbtn) {
                        loginbtn.addEventListener("click", function(event) {
                            event.preventDefault();
                            logintoSystem();
                        });
                    }

                </script>
            </form>
            
        </div>
    </div>

    <div class="error-msg-box">
        <i id="error-close-btn" class="fa-solid fa-xmark fa-xl" style="color: rgb(255, 3, 3);"></i>
        <p id="error-text">Invalid username or password. Please try again.</p>

        <script>
            var errorBox = document.querySelector(".error-msg-box");
            var errorCloseBtn = document.getElementById("error-close-btn");

            function showError(message) {
                errorBox.style.transform = "translate(-50%, -100%)";
                showErrorSlowly();
            }

            function hideError() {
                errorBox.style.transform = "translate(-50%, -600%)";
                showErrorSlowly();
            }

            function showErrorSlowly(){
                errorBox.style.transition = "transform 0.5s ease-in-out";
                
            }

            function hideErrorAuto(){
                setTimeout(function() {
                    hideError();
                }, 3000);
            }

            if (errorCloseBtn) {
                errorCloseBtn.addEventListener("click", hideError);
            }
        </script>
    </div>
</body>
</html>
