<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS.pro Dashboard</title>
    <link rel="stylesheet" href="css/system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo-area">
                <h1>POS.<span>pro</span></h1>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-box"></i> Items</a></li>
                <li><a href="#"><i class="fas fa-users"></i> Customers</a></li>
                <li><a href="#"><i class="fas fa-shopping-cart"></i> Orders</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h2 class="brand-name">POS.pro</h2>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search">
                </div>
            </header>

            <section class="content-body">
                <div class="page-title">
                    <i class="fas fa-chart-line title-icon"></i>
                    <h3>Dashboard</h3>
                </div>

                <div class="stats-card">
                    <div class="stat-item">
                        <i class="fas fa-cube icon-items"></i>
                        <span>Items :</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-user-friends icon-customers"></i>
                        <span>Customers :</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-clipboard-list icon-stock"></i>
                        <span>Stock units :</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-shopping-bag icon-cart"></i>
                        <span>Cart items :</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
